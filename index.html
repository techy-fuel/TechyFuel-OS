<!-- App router -->
<script>
(function () {
  'use strict';

  /* ── Route table ──────────────────────────────────────────── */
  var ROUTES = {
    dashboard:    { crumb: 'Workspace', title: 'Executive dashboard', comp: 'Dashboard' },
    tasks:        { crumb: 'Workspace', title: 'Tasks',               comp: 'TasksBoard' },
    projects:     { crumb: 'Workspace', title: 'Projects',            comp: 'Projects' },
    content:      { crumb: 'Marketing', title: 'Content calendar',    comp: 'ContentCalendar' },
    crm:          { crumb: 'Clients',   title: 'Client CRM',          comp: 'CRM' },
    ads:          { crumb: 'Marketing', title: 'Meta Ads Center',     comp: 'MetaAds' },
    portal:       { crumb: 'Clients',   title: 'Client portal',       comp: 'ClientPortal' },
    pipeline:     { crumb: 'Clients',   title: 'Sales pipeline',      comp: 'Pipeline' },
    finance:      { crumb: 'Business',  title: 'Finance',             comp: 'Finance' },
    reports:      { crumb: 'Business',  title: 'Reporting center',    comp: 'Reports' },
    files:        { crumb: 'Business',  title: 'Files',               comp: 'Files' },
    docs:         { crumb: 'Business',  title: 'Docs & Files',        comp: 'Docs' },
    team:         { crumb: 'Business',  title: 'Team',                comp: 'Team' },
    chat:         { crumb: 'Business',  title: 'Team Chat',           comp: 'TeamChat' },
    automations:  { crumb: 'Business',  title: 'Automations',         comp: 'Automations' },
    activity:     { crumb: 'Business',  title: 'Activity Log',        comp: 'ActivityLog' },
    integrations: { crumb: 'Business',  title: 'Integrations',        comp: 'Integrations' },
    workspace:    { crumb: 'Business',  title: 'Workspace',           comp: 'Workspace' },
    settings:     { crumb: 'Workspace', title: 'Settings',            comp: 'Settings' },
    calendar:     { crumb: 'Workspace', title: 'Calendar',           comp: 'Calendar' },
  };

  var PLACEHOLDER = {};
  var e = React.createElement;

  /* ── Role-based access ──────────────────────────────────────
     'member' is restricted to day-to-day work screens — company-wide
     admin surfaces (finance, team management, integrations, workspace
     settings, the audit log) stay owner/admin-only. Clients never sign
     in here at all — they use the separate client-portal.html, already
     scoped to their own client_id. Unknown/no team_members row (e.g. a
     brand-new owner signup) defaults to full access. */
  var MEMBER_HIDDEN_ROUTES = ['finance', 'team', 'integrations', 'workspace', 'activity'];

  /* ── URL <-> screen-id mapping ──────────────────────────────
     Each screen gets its own bookmarkable/shareable URL (e.g. /tasks),
     switched via the History API so navigation never triggers a full
     page reload (real-time chat/notifications stay connected). */
  function pathToRoute(pathname) {
    var seg = (pathname || '/').replace(/^\/+|\/+$/g, '');
    if (!seg) return 'dashboard';
    return ROUTES[seg] ? seg : null;
  }

  /* ── Placeholder for unbuilt modules ─────────────────────── */
  function Placeholder(props) {
    var pair  = PLACEHOLDER[props.id] || ['layout-dashboard', 'Module'];
    return e('div', {
      style: { height: '100%', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 16, padding: 40 }},
      e('span', { style: { width: 64, height: 64, borderRadius: 'var(--radius-2xl)',
          background: 'var(--blue-50)', display: 'inline-flex',
          alignItems: 'center', justifyContent: 'center' }},
        e(window.Icon, { name: pair[0], size: 30, style: { color: 'var(--blue-600)' } })
      ),
      e('div', { style: { textAlign: 'center' } },
        e('h2', { style: { fontSize: 'var(--text-2xl)', fontWeight: 'var(--fw-extrabold)',
            letterSpacing: '-0.02em', margin: 0 }}, pair[1]),
        e('p', { style: { fontSize: 'var(--text-base)', color: 'var(--text-muted)',
            marginTop: 6, maxWidth: 360 }},
          'This module is part of TechyFuel OS. Explore the other screens from the sidebar.')
      ),
      e('span', { style: { fontSize: 'var(--text-xs)', fontWeight: 'var(--fw-semibold)',
          color: 'var(--blue-700)', background: 'var(--blue-50)',
          borderRadius: 'var(--radius-full)', padding: '5px 12px' }}, 'Kit preview')
    );
  }

  /* ── Loading screen ──────────────────────────────────────── */
  function LoadingScreen() {
    return e('div', { style: { height: '100vh', display: 'flex', alignItems: 'center',
        justifyContent: 'center',
        background: 'linear-gradient(145deg,#0c1320 0%,#0f2044 45%,#1a3a6e 100%)' }},
      e('div', { style: { textAlign: 'center' } },
        e('div', { style: { width: 56, height: 56, border: '3px solid rgba(255,255,255,0.15)',
          borderTop: '3px solid #60a5fa', borderRadius: '50%',
          animation: 'tf-spin 0.8s linear infinite', margin: '0 auto 18px' }}),
        e('p', { style: { color: 'rgba(255,255,255,0.55)', fontSize: 14 } }, 'Loading TechyFuel OS…')
      )
    );
  }

  /* ── Suspended-account screen ───────────────────────────────── */
  function SuspendedScreen(props) {
    React.useEffect(function () { if (window.lucide) window.lucide.createIcons(); });
    return e('div', { style: { height: '100vh', display: 'flex', alignItems: 'center',
        justifyContent: 'center', background: 'linear-gradient(145deg,#0c1320 0%,#0f2044 45%,#1a3a6e 100%)', padding: 24 }},
      e('div', { style: { textAlign: 'center', maxWidth: 380 } },
        e('span', { style: { display: 'inline-flex', width: 56, height: 56, borderRadius: '50%',
            background: 'rgba(239,68,68,0.15)', alignItems: 'center', justifyContent: 'center', marginBottom: 18 } },
          e(window.Icon, { name: 'user-x', size: 26, style: { color: '#f87171' } })
        ),
        e('h2', { style: { color: '#fff', fontSize: 20, fontWeight: 800, margin: '0 0 8px' } }, 'Account suspended'),
        e('p', { style: { color: 'rgba(255,255,255,0.6)', fontSize: 14, lineHeight: 1.6, margin: '0 0 22px' } },
          'Your access to TechyFuel OS has been suspended by an administrator. Contact your workspace owner if you believe this is a mistake.'),
        e('button', {
          onClick: props.onSignOut,
          style: { height: 38, padding: '0 20px', background: 'rgba(255,255,255,0.1)', color: '#fff',
            border: '1px solid rgba(255,255,255,0.2)', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer' }
        }, 'Back to sign in')
      )
    );
  }

  /* ── Access-restricted placeholder (member hit a gated route) ── */
  function AccessRestricted() {
    React.useEffect(function () { if (window.lucide) window.lucide.createIcons(); });
    return e('div', { style: { height: '100%', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 14, padding: 40 } },
      e('span', { style: { width: 56, height: 56, borderRadius: '50%', background: 'var(--amber-50)',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center' } },
        e(window.Icon, { name: 'lock', size: 24, style: { color: 'var(--amber-600)' } })
      ),
      e('div', { style: { textAlign: 'center' } },
        e('h2', { style: { fontSize: 'var(--text-xl)', fontWeight: 'var(--fw-bold)', margin: 0 } }, 'Access restricted'),
        e('p', { style: { fontSize: 'var(--text-sm)', color: 'var(--text-muted)', marginTop: 6, maxWidth: 340 } },
          "This section is only available to workspace owners and admins.")
      )
    );
  }

  /* ── Root app ────────────────────────────────────────────── */
  function App() {
    var s1 = React.useState(function () { return pathToRoute(window.location.pathname) || 'dashboard'; });
    var active = s1[0], setActive = s1[1];
    var s2 = React.useState(false);       var aiOpen = s2[0], setAiOpen = s2[1];
    var s3 = React.useState(null);        var authUser = s3[0], setAuthUser = s3[1];
    var s4 = React.useState(true);        var authLoading = s4[0], setAuthLoading = s4[1];
    var s5 = React.useState(false);       var suspended = s5[0], setSuspended = s5[1];
    var s6 = React.useState(true);        var accessChecked = s6[0], setAccessChecked = s6[1];
    var s7 = React.useState(null);        var myRole = s7[0], setMyRole = s7[1];

    function navigate(id) {
      if (window.location.pathname !== '/' + id) window.history.pushState({ id: id }, '', '/' + id);
      setActive(id);
    }

    // Redirect unknown paths straight to the dashboard.
    React.useEffect(function () {
      if (!pathToRoute(window.location.pathname)) window.history.replaceState({}, '', '/dashboard');
    }, []);

    // Sync screen with the browser's back/forward buttons.
    React.useEffect(function () {
      function onPopState() { setActive(pathToRoute(window.location.pathname) || 'dashboard'); }
      window.addEventListener('popstate', onPopState);
      return function () { window.removeEventListener('popstate', onPopState); };
    }, []);

    React.useEffect(function () { window.TFNavigate = navigate; }, []);

    React.useEffect(function () {
      if (!window.db) { setAuthLoading(false); return; }
      window.db.auth.getSession().then(function (res) {
        setAuthUser((res.data && res.data.session && res.data.session.user) || null);
        setAuthLoading(false);
      }).catch(function () { setAuthLoading(false); });
      var sub = window.db.auth.onAuthStateChange(function (_evt, session) {
        setAuthUser((session && session.user) || null);
      });
      return function () { try { sub.data.subscription.unsubscribe(); } catch (x) {} };
    }, []);

    // Block access if this user's team_members row has been suspended,
    // and pick up their role for sidebar/route gating below.
    React.useEffect(function () {
      if (!authUser || !window.API) { setAccessChecked(true); return; }
      setAccessChecked(false);
      setSuspended(false);
      setMyRole(null);
      window.API.getTeamMemberByEmail(authUser.email).then(function (r) {
        if (r.data && r.data.status === 'inactive') {
          setSuspended(true);
          if (window.db) window.db.auth.signOut();
        } else if (r.data) {
          setMyRole(r.data.role || 'member');
        }
        setAccessChecked(true);
      }).catch(function () { setAccessChecked(true); });
    }, [authUser]);

    function handleSignOut() {
      if (window.db) window.db.auth.signOut();
      setAuthUser(null);
      setSuspended(false);
    }

    if (authLoading || (authUser && !accessChecked)) return e(LoadingScreen);
    if (suspended) return e(SuspendedScreen, { onSignOut: handleSignOut });
    if (!authUser && window.db) return e(window.AuthScreen, { onAuth: setAuthUser });

    var hiddenIds = myRole === 'member' ? MEMBER_HIDDEN_ROUTES : [];
    var route = ROUTES[active];
    var meta  = route || { crumb: 'TechyFuel OS', title: (PLACEHOLDER[active] || ['', 'Module'])[1] };
    var restricted = hiddenIds.indexOf(active) !== -1;
    var screenEl = restricted ? e(AccessRestricted) : (route ? e(window[route.comp]) : e(Placeholder, { id: active }));

    return e(React.Fragment, null,
      e(window.AppShell, {
        active: active, onNavigate: navigate,
        title: restricted ? 'Access restricted' : meta.title, crumb: meta.crumb,
        onOpenAI: function () { setAiOpen(true); },
        authUser: authUser, onSignOut: handleSignOut,
        hiddenIds: hiddenIds,
      }, screenEl),
      e(window.AIPanel, { open: aiOpen, onClose: function () { setAiOpen(false); } })
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(e(App));
})();
</script>
</body>
