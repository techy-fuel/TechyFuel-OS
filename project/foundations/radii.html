<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Corner radius scale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:22px;align-items:flex-end;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:74px;height:74px;background:var(--blue-50);border:1.5px solid var(--blue-300);}
  .name{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-body);}
  .val{font-size:var(--text-2xs);color:var(--text-subtle);}
</style></head><body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="name">sm</span><span class="val">6px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="name">md</span><span class="val">8px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="name">lg</span><span class="val">10px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="name">xl</span><span class="val">12px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="name">2xl</span><span class="val">16px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-3xl)"></div><span class="name">3xl</span><span class="val">20px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-full)"></div><span class="name">full</span><span class="val">999</span></div>
</body></html>
