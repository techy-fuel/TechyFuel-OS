<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & shadows" subtitle="Cool slate-tinted shadow ladder + brand glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 24px;background:var(--surface-page);font-family:var(--font-sans);display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .box{width:90px;height:64px;background:#fff;border-radius:var(--radius-xl);border:1px solid var(--border-subtle);}
  .name{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-body);}
</style></head><body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="name">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="name">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="name">md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="name">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="name">xl</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-brand);border-color:transparent;background:var(--blue-600)"></div><span class="name">brand</span></div>
</body></html>
