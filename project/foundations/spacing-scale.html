<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar{height:14px;background:var(--blue-200);border-radius:3px;}
  .name{width:74px;font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-body);}
  .val{font-size:var(--text-xs);color:var(--text-subtle);font-variant-numeric:tabular-nums;}
</style></head><body>
  <div class="row"><span class="name">space-2</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="name">space-4</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">space-6</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">space-12</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="name">space-16</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">space-24</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="name">space-32</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
</body></html>
