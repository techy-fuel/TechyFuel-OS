<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate" subtitle="Cool gray ramp for surfaces, text, borders" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .scale{display:grid;grid-template-columns:repeat(13,1fr);gap:5px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:56px;border-radius:var(--radius-md);box-shadow:var(--ring-hairline);}
  .n{font-size:9px;font-weight:var(--fw-bold);color:var(--text-body);font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="scale">
  <div class="sw"><div class="chip" style="background:var(--slate-0)"></div><span class="n">0</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-25)"></div><span class="n">25</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><span class="n">50</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><span class="n">100</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-150)"></div><span class="n">150</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><span class="n">200</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><span class="n">300</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><span class="n">400</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><span class="n">500</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><span class="n">600</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><span class="n">700</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><span class="n">800</span></div>
  <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><span class="n">900</span></div>
</div>
</body></html>
