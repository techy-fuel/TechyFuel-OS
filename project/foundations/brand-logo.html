<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--surface-card);font-family:var(--font-sans);display:flex;min-height:100vh;}
  .light{flex:1.4;display:flex;align-items:center;justify-content:center;background:var(--grad-hero);}
  .dark{flex:1;display:flex;align-items:center;justify-content:center;background:var(--slate-900);}
  .light img{width:74%;max-width:360px;}
  .dark img{width:80%;max-width:230px;}
</style></head><body>
  <div class="light"><img src="../assets/techyfuel-logo.png" alt="TechyFuel"></div>
  <div class="dark"><img src="../assets/techyfuel-logo.png" alt="TechyFuel" style="filter:brightness(0) invert(1)"></div>
</body></html>
