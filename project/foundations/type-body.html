<!-- @dsCard group="Type" viewport="700x230" name="Body, labels & eyebrow" subtitle="UI text roles at 14px base" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:none;}
  .meta{flex:none;width:120px;font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-subtle);text-transform:uppercase;letter-spacing:.04em;}
  .lg{font-size:var(--text-lg);color:var(--text-body);}
  .body{font-size:var(--text-base);color:var(--text-body);line-height:1.5;}
  .label{font-size:var(--text-sm);font-weight:600;color:var(--text-strong);}
  .cap{font-size:var(--text-xs);color:var(--text-muted);}
  .eyebrow{font-size:var(--text-2xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
</style></head><body>
  <div class="row"><span class="meta">Lead · 16/400</span><span class="lg">All-in-one operating system for digital agencies.</span></div>
  <div class="row"><span class="meta">Body · 14/400</span><span class="body">Track projects, clients, finance and ad performance in one calm, powerful workspace.</span></div>
  <div class="row"><span class="meta">Label · 13/600</span><span class="label">Company name</span></div>
  <div class="row"><span class="meta">Caption · 12/400</span><span class="cap">Last synced 4 minutes ago</span></div>
  <div class="row"><span class="meta">Eyebrow · 11/700</span><span class="eyebrow">This month</span></div>
</body></html>
