<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Plus Jakarta Sans, bold, tight tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-strong);}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:none;}
  .meta{flex:none;width:118px;font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-subtle);text-transform:uppercase;letter-spacing:.04em;}
  .d1{font-size:var(--text-6xl);font-weight:800;letter-spacing:-.03em;line-height:1;}
  .h1{font-size:var(--text-4xl);font-weight:800;letter-spacing:-.018em;}
  .h2{font-size:var(--text-3xl);font-weight:700;letter-spacing:-.018em;}
  .h3{font-size:var(--text-2xl);font-weight:700;letter-spacing:-.018em;}
</style></head><body>
  <div class="row"><span class="meta">Display · 48/800</span><span class="d1">Fuel the agency</span></div>
  <div class="row"><span class="meta">H1 · 31/800</span><span class="h1">Executive dashboard</span></div>
  <div class="row"><span class="meta">H2 · 25/700</span><span class="h2">Revenue & client growth</span></div>
  <div class="row"><span class="meta">H3 · 21/700</span><span class="h3">Active projects this month</span></div>
</body></html>
