<!-- @dsCard group="Type" viewport="700x150" name="Numerics & mono" subtitle="Tabular figures · JetBrains Mono" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:40px;align-items:center;flex-wrap:wrap;}
  .block{display:flex;flex-direction:column;gap:6px;}
  .eyebrow{font-size:var(--text-2xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);}
  .metric{font-size:var(--text-5xl);font-weight:800;letter-spacing:-.02em;color:var(--text-strong);font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:var(--text-base);color:var(--text-body);}
  .pos{color:var(--green-600);font-weight:700;font-size:var(--text-base);}
</style></head><body>
  <div class="block"><span class="eyebrow">Monthly revenue</span><span class="metric">$48,250</span><span class="pos">▲ 12.5% vs last month</span></div>
  <div class="block"><span class="eyebrow">ROAS · CPL · invoice id</span><span class="mono">12.4×&nbsp;&nbsp;·&nbsp;&nbsp;$3.18&nbsp;&nbsp;·&nbsp;&nbsp;INV-2026-0481</span><span class="mono" style="color:var(--text-subtle)">0123456789 — tabular nums</span></div>
</body></html>
