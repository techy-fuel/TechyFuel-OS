<!-- @dsCard group="Colors" viewport="700x170" name="Status colors" subtitle="Success, warning, danger, info — bg + solid pairs" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .pill{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;padding:3px 10px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:var(--fw-semibold);}
  .dot{width:7px;height:7px;border-radius:50%;}
  .solid{height:36px;border-radius:var(--radius-md);box-shadow:var(--ring-hairline);}
  .lab{font-size:var(--text-2xs);font-weight:var(--fw-bold);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-subtle);}
</style></head><body>
<div class="grid">
  <div class="col"><span class="lab">Success</span><span class="pill" style="background:var(--green-50);color:var(--green-700)"><span class="dot" style="background:var(--green-500)"></span>Active</span><div class="solid" style="background:var(--green-600)"></div></div>
  <div class="col"><span class="lab">Warning</span><span class="pill" style="background:var(--amber-50);color:var(--amber-700)"><span class="dot" style="background:var(--amber-500)"></span>Pending</span><div class="solid" style="background:var(--amber-500)"></div></div>
  <div class="col"><span class="lab">Danger</span><span class="pill" style="background:var(--red-50);color:var(--red-700)"><span class="dot" style="background:var(--red-500)"></span>Overdue</span><div class="solid" style="background:var(--red-600)"></div></div>
  <div class="col"><span class="lab">Info</span><span class="pill" style="background:var(--blue-50);color:var(--blue-700)"><span class="dot" style="background:var(--blue-500)"></span>In review</span><div class="solid" style="background:var(--blue-600)"></div></div>
  <div class="col"><span class="lab">Accent</span><span class="pill" style="background:var(--violet-50);color:var(--violet-600)"><span class="dot" style="background:var(--violet-500)"></span>Proposal</span><div class="solid" style="background:var(--violet-500)"></div></div>
</div>
</body></html>
