<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>TechyFuel OS</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; margin: 0; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<!-- ── Laravel backend (auth + database) — QA build on the
     laravel-migration branch, points at the live Hostinger API.
     main branch keeps the Supabase block above unchanged. ── -->
<script>
  window.__LARAVEL_API_URL = 'https://api.techyfuel.com/api';
</script>
<script src="laravel-api.js?v=1"></script>
<script type="text/babel" src="helpers.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Auth.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="charts.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="AppShell.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Dashboard.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Projects.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="ContentCalendar.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="CRM.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="TasksBoard.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="MetaAds.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="AIPanel.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="ClientPortal.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Pipeline.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Finance.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Reports.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Files.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Team.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Calendar.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Settings.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="TeamChat.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Automations.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="ActivityLog.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Docs.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Integrations.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Workspace.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="QuickAdd.jsx?v=5" data-presets="react"></script>
<script type="text/babel" src="Email.jsx?v=5" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const ROUTES = {
  dashboard: { crumb: 'Workspace', title: 'Executive dashboard', render: () => <Dashboard /> },
  tasks:     { crumb: 'Workspace', title: 'Tasks', render: () => <TasksBoard /> },
  projects:  { crumb: 'Workspace', title: 'Projects', render: () => <Projects /> },
  content:   { crumb: 'Marketing', title: 'Content calendar', render: () => <ContentCalendar /> },
  crm:       { crumb: 'Clients', title: 'Client CRM', render: () => <CRM /> },
  ads:       { crumb: 'Marketing', title: 'Meta Ads Center', render: () => <MetaAds /> },
  portal:    { crumb: 'Clients', title: 'Client portal', render: () => <ClientPortal /> },
  pipeline:  { crumb: 'Clients', title: 'Sales pipeline', render: () => <Pipeline /> },
  email:     { crumb: 'Business', title: 'Email', render: () => <Email /> },
  finance:   { crumb: 'Business', title: 'Finance', render: () => <Finance /> },
  reports:   { crumb: 'Business', title: 'Reporting center', render: () => <Reports /> },
  files:     { crumb: 'Business', title: 'Files', render: () => <Files /> },
  docs:      { crumb: 'Business', title: 'Docs & Files', render: () => <Docs /> },
  team:      { crumb: 'Business', title: 'Team', render: () => <Team /> },
  chat:      { crumb: 'Business', title: 'Team Chat', render: () => <TeamChat /> },
  calendar:  { crumb: 'Workspace', title: 'Calendar', render: () => <Calendar /> },
  automations:  { crumb: 'Business', title: 'Automations', render: () => <Automations /> },
  activity:     { crumb: 'Business', title: 'Activity Log', render: () => <ActivityLog /> },
  integrations: { crumb: 'Business', title: 'Integrations', render: () => <Integrations /> },
  workspace:    { crumb: 'Business', title: 'Workspace', render: () => <Workspace /> },
  settings:  { crumb: 'Workspace', title: 'Settings', render: () => <Settings /> },
};
const PLACEHOLDER = {};

function Placeholder({ id }) {
  const [icon, label] = PLACEHOLDER[id] || ['layout-dashboard', 'Module'];
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, padding: 40 }}>
      <span style={{ width: 64, height: 64, borderRadius: 'var(--radius-2xl)', background: 'var(--blue-50)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name={icon} size={30} style={{ color: 'var(--blue-600)' }} />
      </span>
      <div style={{ textAlign: 'center' }}>
        <h2 style={{ fontSize: 'var(--text-2xl)', fontWeight: 'var(--fw-extrabold)', letterSpacing: '-0.02em' }}>{label}</h2>
        <p style={{ fontSize: 'var(--text-base)', color: 'var(--text-muted)', marginTop: 6, maxWidth: 360 }}>
          This module is part of TechyFuel OS. Explore Dashboard, Tasks, CRM, Meta Ads and the Client Portal in this kit.
        </p>
      </div>
      <span style={{ fontSize: 'var(--text-xs)', fontWeight: 'var(--fw-semibold)', color: 'var(--blue-700)', background: 'var(--blue-50)', borderRadius: 'var(--radius-full)', padding: '5px 12px' }}>Kit preview</span>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:'linear-gradient(145deg,#0c1320 0%,#0f2044 45%,#1a3a6e 100%)' }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ width:56, height:56, border:'3px solid rgba(255,255,255,0.15)', borderTop:'3px solid #60a5fa',
          borderRadius:'50%', animation:'tf-spin 0.8s linear infinite', margin:'0 auto 18px' }} />
        <p style={{ color:'rgba(255,255,255,0.55)', fontSize:14, fontFamily:'var(--font-sans)' }}>Loading TechyFuel OS…</p>
      </div>
      <style>{`@keyframes tf-spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState('dashboard');
  const [aiOpen, setAiOpen] = React.useState(false);
  const [quickAddOpen, setQuickAddOpen] = React.useState(false);
  const [authUser, setAuthUser] = React.useState(null);
  const [authLoading, setAuthLoading] = React.useState(true);

  React.useEffect(() => { window.TFNavigate = setActive; }, [setActive]);
  React.useEffect(() => { window.TFOpenAI = () => setAiOpen(true); }, []);

  React.useEffect(() => {
    function onKeyDown(e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'j') {
        e.preventDefault();
        setQuickAddOpen(true);
      }
    }
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  React.useEffect(() => {
    if (!window.db) { setAuthLoading(false); return; }
    window.db.auth.getSession().then(({ data: { session } }) => {
      setAuthUser(session?.user ?? null);
      setAuthLoading(false);
    }).catch(() => setAuthLoading(false));
    const { data: { subscription } } = window.db.auth.onAuthStateChange((_event, session) => {
      setAuthUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleSignOut = async () => {
    if (window.db) await window.db.auth.signOut();
    setAuthUser(null);
  };

  if (authLoading) return <LoadingScreen />;
  if (!authUser && window.db) return <AuthScreen onAuth={setAuthUser} />;

  const route = ROUTES[active];
  const meta = route || { crumb: 'TechyFuel OS', title: (PLACEHOLDER[active] || ['', 'Module'])[1] };

  return (
    <>
      <AppShell active={active} onNavigate={setActive} title={meta.title} crumb={meta.crumb}
        onOpenAI={() => setAiOpen(true)} onQuickAdd={() => setQuickAddOpen(true)} authUser={authUser} onSignOut={handleSignOut}>
        {route ? route.render() : <Placeholder id={active} />}
      </AppShell>
      <AIPanel open={aiOpen} onClose={() => setAiOpen(false)} />
      <QuickAddModal open={quickAddOpen} onClose={() => setQuickAddOpen(false)} onNavigate={setActive} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
