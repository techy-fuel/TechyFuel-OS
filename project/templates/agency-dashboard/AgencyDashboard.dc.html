<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Agency dashboard" description="Executive dashboard starter — app shell, KPI tiles and chart cards on the TechyFuel OS system" -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</helmet>

<div style="display:flex; height:100vh; font-family:var(--font-sans); background:var(--surface-page); color:var(--text-body);">

  <!-- Sidebar -->
  <aside style="width:248px; flex:none; background:var(--slate-0); border-right:1px solid var(--border-subtle); display:flex; flex-direction:column;">
    <div style="height:60px; display:flex; align-items:center; gap:9px; padding:0 16px; border-bottom:1px solid var(--border-subtle);">
      <span style="font-family:var(--font-display); font-weight:800; font-size:18px; letter-spacing:-0.02em; color:var(--text-strong);">TechyFuel<span style="color:var(--blue-600);"> OS</span></span>
    </div>
    <nav style="flex:1; padding:14px 12px; display:flex; flex-direction:column; gap:2px;">
      <a style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; background:var(--blue-50); color:var(--blue-700); font-size:14px; font-weight:600;"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i> Dashboard</a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; color:var(--text-body); font-size:14px; font-weight:500;"><i data-lucide="circle-check-big" style="width:18px;height:18px;color:var(--text-muted);"></i> Tasks</a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; color:var(--text-body); font-size:14px; font-weight:500;"><i data-lucide="contact" style="width:18px;height:18px;color:var(--text-muted);"></i> Clients</a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; color:var(--text-body); font-size:14px; font-weight:500;"><i data-lucide="megaphone" style="width:18px;height:18px;color:var(--text-muted);"></i> Meta Ads</a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; color:var(--text-body); font-size:14px; font-weight:500;"><i data-lucide="wallet" style="width:18px;height:18px;color:var(--text-muted);"></i> Finance</a>
    </nav>
  </aside>

  <!-- Main -->
  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    <!-- Top bar -->
    <header style="height:60px; flex:none; display:flex; align-items:center; gap:16px; padding:0 24px; background:var(--glass-bg-strong); backdrop-filter:blur(16px); border-bottom:1px solid var(--border-subtle);">
      <span style="font-size:15px; font-weight:700; color:var(--text-strong);">Executive dashboard</span>
      <div style="flex:1;"></div>
      <button style="display:inline-flex; align-items:center; gap:7px; height:36px; padding:0 13px; border-radius:8px; background:var(--grad-brand); color:#fff; border:none; box-shadow:var(--shadow-brand); font-family:var(--font-sans); font-size:13px; font-weight:600; cursor:pointer;"><i data-lucide="sparkles" style="width:16px;height:16px;"></i> Ask AI</button>
    </header>

    <!-- Content -->
    <main style="flex:1; overflow:auto; padding:24px; max-width:1280px; margin:0 auto; width:100%; box-sizing:border-box;">
      <h1 style="font-size:25px; font-weight:800; letter-spacing:-0.02em; color:var(--text-strong); margin-bottom:18px;">Good morning, Sara</h1>

      <!-- KPI tiles -->
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px;">
        <x-import component-from-global-scope="TechyFuelOSDesignSystem_be0222.StatCard" label="Monthly revenue" value="$48,250" delta="12.5%" tone="success" hint-size="100%,120px"></x-import>
        <x-import component-from-global-scope="TechyFuelOSDesignSystem_be0222.StatCard" label="Active projects" value="27" delta="4.0%" tone="brand" hint-size="100%,120px"></x-import>
        <x-import component-from-global-scope="TechyFuelOSDesignSystem_be0222.StatCard" label="Outstanding" value="$9,420" delta="-3.1%" tone="warning" hint-size="100%,120px"></x-import>
        <x-import component-from-global-scope="TechyFuelOSDesignSystem_be0222.StatCard" label="Active clients" value="38" delta="6.2%" tone="violet" hint-size="100%,120px"></x-import>
      </div>

      <!-- Chart cards -->
      <div style="display:grid; grid-template-columns:2fr 1fr; gap:16px;">
        <div style="background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:16px; box-shadow:var(--shadow-sm); padding:24px;">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
            <h3 style="font-size:16px; font-weight:700; color:var(--text-strong);">Revenue growth</h3>
            <span style="font-size:12px; font-weight:600; color:var(--green-700); background:var(--green-50); border-radius:999px; padding:3px 10px;">+24% YTD</span>
          </div>
          <div style="height:160px; border-radius:10px; background:linear-gradient(180deg, var(--blue-50), transparent); border-bottom:2px solid var(--blue-600); display:flex; align-items:flex-end; justify-content:center; color:var(--text-subtle); font-size:13px; padding-bottom:8px;">Drop your chart here</div>
        </div>
        <div style="background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:16px; box-shadow:var(--shadow-sm); padding:24px;">
          <h3 style="font-size:16px; font-weight:700; color:var(--text-strong); margin-bottom:14px;">Project status</h3>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; align-items:center; gap:8px; font-size:14px;"><span style="width:9px;height:9px;border-radius:3px;background:var(--blue-600);"></span><span style="flex:1; color:var(--text-body);">In progress</span><b style="color:var(--text-strong);">11</b></div>
            <div style="display:flex; align-items:center; gap:8px; font-size:14px;"><span style="width:9px;height:9px;border-radius:3px;background:var(--sky-500);"></span><span style="flex:1; color:var(--text-body);">Review</span><b style="color:var(--text-strong);">7</b></div>
            <div style="display:flex; align-items:center; gap:8px; font-size:14px;"><span style="width:9px;height:9px;border-radius:3px;background:var(--violet-500);"></span><span style="flex:1; color:var(--text-body);">Client approval</span><b style="color:var(--text-strong);">5</b></div>
            <div style="display:flex; align-items:center; gap:8px; font-size:14px;"><span style="width:9px;height:9px;border-radius:3px;background:var(--green-500);"></span><span style="flex:1; color:var(--text-body);">Completed</span><b style="color:var(--text-strong);">4</b></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const tick = () => { if (window.lucide) window.lucide.createIcons(); else setTimeout(tick, 120); };
    tick();
  }
  renderVals() { return {}; }
}
</script>
</body>
</html>
