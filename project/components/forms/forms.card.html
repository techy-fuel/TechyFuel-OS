<!-- @dsCard group="Components" viewport="700x320" name="Form controls" subtitle="Input, Select, Switch, Checkbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Input, Select, Switch, Checkbox } = window.TechyFuelOSDesignSystem_be0222;
  const I = (n) => <i data-lucide={n}></i>;
  function Demo() {
    return (
      <div className="grid">
        <Input label="Company name" placeholder="Acme Studio" iconLeft={I('building-2')} />
        <Select label="Industry" options={['E-commerce','SaaS','Healthcare','Real estate']} />
        <Input label="Email" placeholder="hello@acme.com" iconLeft={I('mail')} error="Enter a valid email" />
        <div className="stack">
          <Switch label="Email notifications" defaultChecked />
          <Switch label="Client portal access" />
          <Checkbox label="Mark project as billable" defaultChecked />
          <Checkbox label="Include weekends" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  requestAnimationFrame(() => lucide.createIcons());
</script>
</body>
</html>
